name: Build IPA
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build
        run: |
          xcodebuild -project ValorantESP.xcodeproj -scheme ValorantESP -configuration Release -derivedDataPath build archive -archivePath build/ValorantESP.xcarchive
      - name: Export IPA
        run: |
          xcodebuild -exportArchive -archivePath build/ValorantESP.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ValorantESP.ipa
          path: build/*.ipa
